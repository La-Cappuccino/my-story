<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chef with delivery bag - minimal creative vector -->
  
  <!-- Chef hat -->
  <ellipse cx="60" cy="28" rx="22" ry="12" fill="#FAFAFA"/>
  <rect x="42" y="25" width="36" height="18" rx="2" fill="#FAFAFA"/>
  <circle cx="50" cy="22" r="5" fill="#FAFAFA"/>
  <circle cx="60" cy="20" r="6" fill="#FAFAFA"/>
  <circle cx="70" cy="22" r="5" fill="#FAFAFA"/>
  
  <!-- Chef face -->
  <circle cx="60" cy="50" r="16" fill="#F5D0B5"/>
  
  <!-- Eyes -->
  <circle cx="54" cy="48" r="2.5" fill="#2D2D2D"/>
  <circle cx="66" cy="48" r="2.5" fill="#2D2D2D"/>
  
  <!-- Smile -->
  <path d="M54 56 Q60 62 66 56" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Body with apron -->
  <path d="M40 68 Q38 85 42 105 L78 105 Q82 85 80 68 Q70 65 60 66 Q50 65 40 68Z" fill="#f97316"/>
  
  <!-- Apron -->
  <path d="M48 72 L48 100 L72 100 L72 72 Q60 70 48 72Z" fill="#FAFAFA"/>
  <rect x="56" y="78" width="8" height="6" rx="1" fill="#f97316"/>
  
  <!-- Arms holding bag -->
  <ellipse cx="34" cy="82" rx="6" ry="4" fill="#F5D0B5" transform="rotate(-20 34 82)"/>
  <ellipse cx="86" cy="82" rx="6" ry="4" fill="#F5D0B5" transform="rotate(20 86 82)"/>
  
  <!-- Delivery bag -->
  <rect x="28" y="86" width="24" height="22" rx="3" fill="#22c55e"/>
  <rect x="32" y="90" width="16" height="4" rx="1" fill="#FAFAFA" opacity="0.9"/>
  
  <!-- Food items peeking out -->
  <circle cx="36" cy="88" r="4" fill="#FCD34D"/>
  <ellipse cx="44" cy="87" rx="3" ry="4" fill="#EF4444"/>
  
  <!-- Steam/freshness lines -->
  <path d="M38 78 Q40 74 38 70" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M44 76 Q46 72 44 68" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Motion lines (delivering) -->
  <line x1="90" y1="75" x2="105" y2="75" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="92" y1="82" x2="108" y2="82" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="90" y1="89" x2="105" y2="89" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
