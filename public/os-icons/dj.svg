<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#FB6422" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Vinyl record outer -->
  <circle cx="30" cy="34" r="22"/>
  <!-- Grooves -->
  <circle cx="30" cy="34" r="16" opacity="0.4"/>
  <circle cx="30" cy="34" r="10" opacity="0.3"/>
  <!-- Center label -->
  <circle cx="30" cy="34" r="5" fill="#FB6422" opacity="0.15" stroke="#FB6422"/>
  <!-- Spindle hole -->
  <circle cx="30" cy="34" r="1.5" fill="#FB6422" stroke="none"/>
  <!-- Tonearm -->
  <line x1="50" y1="10" x2="50" y2="16"/>
  <line x1="50" y1="16" x2="40" y2="28"/>
  <!-- Tonearm pivot -->
  <circle cx="50" cy="10" r="2.5"/>
  <!-- Tonearm head -->
  <line x1="38" y1="30" x2="42" y2="26" stroke-width="3"/>
</svg>
