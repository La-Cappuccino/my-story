<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Echo Robot — EchoAlgoriData AI mascot adapted for AllanOS -->

  <!-- Head glow halo -->
  <circle cx="60" cy="42" r="28" fill="#FB6422" opacity="0.06"/>

  <!-- Antenna -->
  <line x1="60" y1="16" x2="60" y2="8" stroke="#FB6422" stroke-width="2" stroke-linecap="round"/>
  <circle cx="60" cy="6" r="3" fill="#FB6422" opacity="0.8"/>
  <circle cx="60" cy="6" r="5" stroke="#FB6422" stroke-width="1" opacity="0.3"/>

  <!-- Head — rounded rectangle with circuit-board motif -->
  <rect x="36" y="20" width="48" height="40" rx="12" stroke="#FB6422" stroke-width="2.5"/>

  <!-- Face plate inner glow -->
  <rect x="40" y="24" width="40" height="32" rx="8" fill="#FB6422" opacity="0.04"/>

  <!-- Eyes — digital displays -->
  <rect x="44" y="33" width="10" height="8" rx="2" fill="#FB6422" opacity="0.9"/>
  <rect x="66" y="33" width="10" height="8" rx="2" fill="#FB6422" opacity="0.9"/>

  <!-- Eye shine -->
  <rect x="45" y="34" width="4" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="67" y="34" width="4" height="3" rx="1" fill="white" opacity="0.3"/>

  <!-- Mouth — LED bar -->
  <rect x="48" y="48" width="24" height="4" rx="2" stroke="#FB6422" stroke-width="1.5" opacity="0.7"/>
  <rect x="50" y="49" width="4" height="2" rx="1" fill="#FB6422" opacity="0.5"/>
  <rect x="56" y="49" width="4" height="2" rx="1" fill="#FB6422" opacity="0.8"/>
  <rect x="62" y="49" width="4" height="2" rx="1" fill="#FB6422" opacity="0.5"/>
  <rect x="68" y="49" width="2" height="2" rx="1" fill="#FB6422" opacity="0.3"/>

  <!-- Ear nodes -->
  <circle cx="32" cy="40" r="4" stroke="#FB6422" stroke-width="1.5"/>
  <circle cx="32" cy="40" r="1.5" fill="#FB6422" opacity="0.6"/>
  <circle cx="88" cy="40" r="4" stroke="#FB6422" stroke-width="1.5"/>
  <circle cx="88" cy="40" r="1.5" fill="#FB6422" opacity="0.6"/>

  <!-- Neck -->
  <rect x="54" y="60" width="12" height="6" rx="2" stroke="#FB6422" stroke-width="1.5"/>

  <!-- Body — torso with circuit traces -->
  <rect x="32" y="66" width="56" height="36" rx="10" stroke="#FB6422" stroke-width="2.5"/>

  <!-- Body inner plate -->
  <rect x="36" y="70" width="48" height="28" rx="6" fill="#FB6422" opacity="0.03"/>

  <!-- Circuit traces on body (EchoAlgoriData DNA) -->
  <path d="M46 76h8l4 4v8" stroke="#FB6422" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <path d="M74 76h-8l-4 4v8" stroke="#FB6422" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <circle cx="58" cy="88" r="2" fill="#FB6422" opacity="0.3"/>

  <!-- Heart core — Echo Orange power center -->
  <circle cx="60" cy="82" r="6" stroke="#FB6422" stroke-width="1.5"/>
  <circle cx="60" cy="82" r="3" fill="#FB6422" opacity="0.7"/>
  <circle cx="60" cy="82" r="9" stroke="#FB6422" stroke-width="0.8" opacity="0.2"/>

  <!-- Arms -->
  <path d="M32 74l-8 6v10" stroke="#FB6422" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="24" cy="92" r="3" stroke="#FB6422" stroke-width="1.5"/>
  <path d="M88 74l8 6v10" stroke="#FB6422" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="96" cy="92" r="3" stroke="#FB6422" stroke-width="1.5"/>

  <!-- Legs -->
  <path d="M46 102v10" stroke="#FB6422" stroke-width="2" stroke-linecap="round"/>
  <path d="M74 102v10" stroke="#FB6422" stroke-width="2" stroke-linecap="round"/>
  <rect x="40" y="110" width="12" height="4" rx="2" stroke="#FB6422" stroke-width="1.5"/>
  <rect x="68" y="110" width="12" height="4" rx="2" stroke="#FB6422" stroke-width="1.5"/>
</svg>
